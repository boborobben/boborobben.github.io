<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>火石竞技 - 专业赛事盲注计时器</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <!-- PWA 全屏/独立App 配置 -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="火石竞技">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#4F46E5">
    <link rel="apple-touch-startup-image" href="默认网页背景.jpg">
    <link rel="apple-touch-icon" href="LOGO-透明绿色.png">
    
    <style>
        :root {
            --primary: #4F46E5;
            --secondary: #818CF8;
            --accent: #06B6D4;
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
            --dark: #0F172A;
            --light: #F8FAFC;
            --glass: rgba(255,255,255,0.1);
            --glass-border: rgba(255,255,255,0.2);
            --timer-color: #ffffff;
            --info-color: #ffffff;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: url('./默认网页背景.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        
        .container {
            width: 100vw;
            height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        
        /* 顶部区域 */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }
        
        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo-box {
            width: 70px;
            height: 70px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .logo-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .logo-text {
            color: white;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 1px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
        
        .btn-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 10px 14px;
            border-radius: 12px;
            border: none;
            color: white;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            min-width: 44px;
            min-height: 44px;
        }
        
        .btn:hover { transform: translateY(-2px); }
        .btn:active { transform: scale(0.96); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .btn-start { background: var(--success); }
        .btn-pause { background: var(--warning); }
        .btn-reset { background: var(--primary); }
        .btn-final { background: var(--accent); }
        .btn-setting { background: #64748B; }
        .btn-image { background: #A855F7; }
        
        /* 中间区域：左侧竖按钮 + 中央时钟 */
        .center-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
        }
        
        /* 左侧竖排按钮 */
        .vertical-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        /* 中央时钟 */
        .timer-center {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 10px;
        }
        
        .countdown {
            font-size: 120px;
            font-weight: 900;
            color: var(--timer-color);
            text-shadow: 0 0 30px rgba(79, 70, 229, 0.5);
            font-variant-numeric: tabular-nums;
            letter-spacing: 2px;
        }
        
        .stage-tag {
            font-size: 20px;
            color: rgba(255,255,255,0.8);
            font-weight: 500;
        }
        
        /* 盲注信息 */
        .info-grid {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 10px;
        }
        
        .info-item {
            text-align: center;
        }
        
        .info-label {
            font-size: 16px;
            opacity: 0.8;
            margin-bottom: 4px;
            color: var(--info-color);
        }
        
        .info-value {
            font-size: 36px;
            font-weight: 700;
            text-shadow: 0 2px 8px rgba(0,0,0,0.2);
            color: var(--info-color);
        }
        
        /* 底部版权 */
        .footer {
            text-align: center;
            color: rgba(255,255,255,0.5);
            font-size: 12px;
        }
        
        /* 模态框 */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s;
        }
        
        .modal.active {
            opacity: 1;
            pointer-events: auto;
        }
        
        .modal-box {
            background: #1E293B;
            width: 90%;
            max-width: 700px;
            max-height: 85vh;
            border-radius: 20px;
            padding: 24px;
            overflow-y: auto;
            color: white;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        
        .modal-title {
            font-size: 22px;
            font-weight: 700;
        }
        
        .close {
            font-size: 28px;
            cursor: pointer;
            color: #94A3B8;
        }
        
        /* 设置表格头 */
        .table-header {
            display: grid;
            grid-template-columns: 70px 100px 120px 120px 100px;
            gap: 10px;
            font-weight: bold;
            color: var(--accent);
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .level-row {
            display: grid;
            grid-template-columns: 70px 100px 120px 120px 100px;
            gap: 10px;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .level-row input {
            padding: 8px 10px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0F172A;
            color: white;
            font-size: 14px;
            text-align: center;
        }
        
        .add-level {
            margin-top: 10px;
            padding: 8px 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .save-btn {
            margin-top: 20px;
            padding: 12px;
            width: 100%;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        
        /* 动画 */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }
        
        .pulse {
            animation: pulse 1s infinite;
            color: var(--warning) !important;
        }
        
        /* 密码遮罩 */
        #passwordOverlay {
            position: fixed;
            inset: 0;
            background: #0F172A;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .pwd-box {
            text-align: center;
        }
        .pwd-box input {
            padding: 12px 16px;
            font-size: 16px;
            border-radius: 10px;
            border: 2px solid var(--primary);
            background: #1E293B;
            color: white;
            margin: 10px 0;
            text-align: center;
        }
        .pwd-box button {
            padding: 10px 20px;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        
        /* 横屏适配 */
        @media (max-width: 768px) and (orientation: landscape) {
            .countdown { font-size: 80px; }
            .info-value { font-size: 28px; }
            .logo-text { font-size: 20px; }
            .center-wrap { gap: 20px; }
        }
    </style>
</head>
<body>
    <!-- 密码验证层 -->
    <div id="passwordOverlay">
        <div class="pwd-box">
            <h2>火石竞技</h2>
            <p>请输入访问密码</p>
            <input type="password" id="pwdInput" placeholder="输入密码">
            <br>
            <button onclick="checkPassword()">确认进入</button>
            <p style="margin-top:8px;font-size:12px;color:#94a3b8">密码提示：a1b2 / fr2026</p>
        </div>
    </div>

    <div class="container" id="mainContainer" style="display:none;">
        <!-- 顶部：LOGO + 设置按钮 -->
        <div class="top-bar">
            <div class="logo-area">
                <div class="logo-box" id="logoBox">
                    <img src="./LOGO-透明绿色.png" class="logo-img">
                </div>
                <div class="logo-text">火石竞技</div>
            </div>
            
            <div class="btn-group">
                <button class="btn btn-setting" id="normalSet"><i class="fas fa-cog"></i> 常规设置</button>
                <button class="btn btn-setting" id="finalSet"><i class="fas fa-crown"></i> 决赛设置</button>
                <button class="btn btn-image" id="imgSet"><i class="fas fa-palette"></i> 界面设置</button>
            </div>
        </div>
        
        <!-- 中间：左侧竖按钮 + 中央时钟 -->
        <div class="center-wrap">
            <div class="vertical-buttons">
                <button class="btn btn-start" id="start"><i class="fas fa-play"></i> 开始</button>
                <button class="btn btn-pause" id="pause" disabled><i class="fas fa-pause"></i> 暂停</button>
                <button class="btn btn-reset" id="reset"><i class="fas fa-redo"></i> 新局</button>
                <button class="btn btn-final" id="finalMode"><i class="fas fa-trophy"></i> 决赛</button>
            </div>
            
            <div class="timer-center">
                <div class="countdown" id="time">10:00</div>
                <div class="stage-tag" id="stage">常规赛 - 第 1 级</div>
                
                <div class="info-grid">
                    <div class="info-item">
                        <div class="info-label">等级</div>
                        <div class="info-value" id="level">1</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">小盲</div>
                        <div class="info-value" id="sb">100</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">大盲</div>
                        <div class="info-value" id="bb">200</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">ANTE</div>
                        <div class="info-value" id="ante">0</div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 底部 -->
        <div class="footer">火石竞技 © 2026 专业赛事计时器</div>
    </div>

    <!-- ================== 模态框 ================== -->
    <!-- 常规设置 -->
    <div class="modal" id="normalModal">
        <div class="modal-box">
            <div class="modal-header">
                <div class="modal-title">常规级别设置</div>
                <div class="close" onclick="closeModal('normalModal')">&times;</div>
            </div>
            <div class="table-header">
                <div>级别</div>
                <div>升级时长</div>
                <div>小盲注</div>
                <div>大盲注</div>
                <div>ANTE</div>
            </div>
            <div id="normalLevelList"></div>
            <button class="add-level" onclick="addLevel('normal')">增加级别</button>
            <button class="save-btn" onclick="saveNormal()">保存设置</button>
        </div>
    </div>

    <!-- 决赛设置 -->
    <div class="modal" id="finalModal">
        <div class="modal-box">
            <div class="modal-header">
                <div class="modal-title">决赛圈级别设置</div>
                <div class="close" onclick="closeModal('finalModal')">&times;</div>
            </div>
            <div class="table-header">
                <div>级别</div>
                <div>升级时长</div>
                <div>小盲注</div>
                <div>大盲注</div>
                <div>ANTE</div>
            </div>
            <div id="finalLevelList"></div>
            <button class="add-level" onclick="addLevel('final')">增加级别</button>
            <button class="save-btn" onclick="saveFinal()">保存设置</button>
        </div>
    </div>

    <!-- 界面设置（原图片设置） -->
    <div class="modal" id="imgModal">
        <div class="modal-box">
            <div class="modal-header">
                <div class="modal-title">界面设置</div>
                <div class="close" onclick="closeModal('imgModal')">&times;</div>
            </div>
            
            <div style="margin-bottom:16px;">
                <label>俱乐部LOGO：</label><br>
                <input type="file" id="logoFile" accept="image/*"><br>
                <button onclick="setLogo()" style="margin-top:6px; padding:6px 12px; background:var(--primary); color:white; border:none; border-radius:8px;">应用LOGO</button>
            </div>
            
            <div style="margin-bottom:16px;">
                <label>背景图片：</label><br>
                <input type="file" id="bgFile" accept="image/*"><br>
                <button onclick="setBg()" style="margin-top:6px; padding:6px 12px; background:var(--primary); color:white; border:none; border-radius:8px;">应用背景</button>
            </div>
            
            <div>
                <label>倒计时文字颜色：</label><br>
                <input type="color" id="timerColor" value="#ffffff"><br><br>
                
                <label>等级盲注文字颜色：</label><br>
                <input type="color" id="infoColor" value="#ffffff"><br><br>
                
                <button onclick="saveColors()" style="padding:8px 16px; background:var(--success); color:white; border:none; border-radius:8px;">保存配色</button>
            </div>
        </div>
    </div>

    <script>
        // ============== 密码验证 ==============
        function checkPassword() {
            const pwd = $('pwdInput').value.trim();
            const expDate = new Date('2026-06-30');
            const now = new Date();
            
            if(pwd === 'fr2026') {
                $('passwordOverlay').style.display = 'none';
                $('mainContainer').style.display = 'flex';
            } else if(pwd === 'a1b2' && now <= expDate) {
                $('passwordOverlay').style.display = 'none';
                $('mainContainer').style.display = 'flex';
            } else {
                alert('密码错误或已过期');
            }
        }

        // ============== 核心数据 ==============
        let timer = null;
        let running = false;
        let isFinal = false;
        let currLevel = 1;
        let timeLeft = 600;
        let beepPlayed = false;

        // 常规级别默认 10级
        let normalLevels = [
            {time:10, sb:100, bb:200, ante:0},
            {time:10, sb:200, bb:400, ante:0},
            {time:10, sb:400, bb:800, ante:25},
            {time:10, sb:800, bb:1600, ante:50},
            {time:10, sb:1600, bb:3200, ante:100},
            {time:10, sb:3200, bb:6400, ante:200},
            {time:10, sb:6400, bb:12800, ante:400},
            {time:10, sb:12800, bb:25600, ante:800},
            {time:10, sb:25600, bb:51200, ante:1600},
            {time:10, sb:51200, bb:102400, ante:3200}
        ];

        // 决赛级别默认 5级
        let finalLevels = [
            {time:5, sb:100000, bb:200000, ante:10000},
            {time:5, sb:200000, bb:400000, ante:20000},
            {time:5, sb:400000, bb:800000, ante:40000},
            {time:5, sb:800000, bb:1600000, ante:80000},
            {time:5, sb:1600000, bb:3200000, ante:160000}
        ];

        // ============== DOM ==============
        const $ = id => document.getElementById(id);
        const dom = {
            time: $('time'), level: $('level'), stage: $('stage'),
            sb: $('sb'), bb: $('bb'), ante: $('ante'),
            start: $('start'), pause: $('pause')
        };

        // ============== 工具 ==============
        function fmt(t) {
            let m = Math.floor(t/60).toString().padStart(2,'0');
            let s = (t%60).toString().padStart(2,'0');
            return m+':'+s;
        }

        // 最后10秒提示音
        function playBeep() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const o = ctx.createOscillator();
                const g = ctx.createGain();
                o.connect(g);
                g.connect(ctx.destination);
                o.frequency.value = 950;
                g.gain.value = 0.3;
                o.start();
                o.stop(ctx.currentTime + 0.15);
            } catch(e) {}
        }

        function refresh() {
            let data = isFinal ? finalLevels[currLevel-1] : normalLevels[currLevel-1];
            dom.time.innerText = fmt(timeLeft);
            dom.level.innerText = currLevel;
            dom.sb.innerText = data.sb.toLocaleString();
            dom.bb.innerText = data.bb.toLocaleString();
            dom.ante.innerText = data.ante.toLocaleString();
            dom.stage.innerText = (isFinal ? '决赛圈' : '常规赛') + ' - 第 ' + currLevel + ' 级';
            
            // 最后10秒音效 + 闪烁
            if(timeLeft <= 10 && running) {
                if(!beepPlayed) {
                    playBeep();
                    beepPlayed = true;
                }
                dom.time.classList.add('pulse');
            } else {
                beepPlayed = false;
                dom.time.classList.remove('pulse');
            }
        }

        // ============== 计时逻辑 ==============
        function start() {
            if(running) return;
            running = true;
            dom.start.disabled = true;
            dom.pause.disabled = false;
            
            timer = setInterval(()=>{
                timeLeft--;
                refresh();
                
                if(timeLeft <= 0) {
                    let list = isFinal ? finalLevels : normalLevels;
                    currLevel++;
                    if(currLevel > list.length) currLevel = list.length;
                    timeLeft = list[currLevel-1].time * 60;
                    beepPlayed = false;
                }
            },1000);
        }

        function pause() {
            running = false;
            clearInterval(timer);
            dom.start.disabled = false;
            dom.pause.disabled = true;
        }

        function reset() {
            pause();
            isFinal = false;
            currLevel = 1;
            timeLeft = normalLevels[0].time * 60;
            refresh();
        }

        function goFinal() {
            pause();
            isFinal = true;
            currLevel = 1;
            timeLeft = finalLevels[0].time * 60;
            refresh();
        }

        // ============== 设置界面 ==============
        function openModal(id) {
            $(''+id).classList.add('active');
        }
        function closeModal(id) {
            $(''+id).classList.remove('active');
        }

        // 渲染级别行（步长100）
        function renderLevels(type) {
            let list = type==='normal' ? normalLevels : finalLevels;
            let html = '';
            list.forEach((item,i)=>{
                html += `
                <div class="level-row">
                    <div>第${i+1}级</div>
                    <input type="number" value="${item.time}" placeholder="时间" data-i="${i}" data-key="time">
                    <input type="number" value="${item.sb}" step="100" placeholder="小盲" data-i="${i}" data-key="sb">
                    <input type="number" value="${item.bb}" step="100" placeholder="大盲" data-i="${i}" data-key="bb">
                    <input type="number" value="${item.ante}" placeholder="ANTE" data-i="${i}" data-key="ante">
                </div>`;
            });
            $(type+'LevelList').innerHTML = html;
        }

        // 增级
        function addLevel(type) {
            let obj = {time:10, sb:100, bb:200, ante:0};
            type==='normal' ? normalLevels.push(obj) : finalLevels.push(obj);
            renderLevels(type);
        }

        // 保存常规
        function saveNormal() {
            let rows = $('normalLevelList').querySelectorAll('.level-row');
            normalLevels = [];
            rows.forEach(r=>{
                let t = r.querySelector('[data-key=time]').value*1 || 10;
                let sb = r.querySelector('[data-key=sb]').value*1 || 100;
                let bb = r.querySelector('[data-key=bb]').value*1 || 200;
                let a = r.querySelector('[data-key=ante]').value*1 || 0;
                normalLevels.push({time:t, sb, bb, ante:a});
            });
            closeModal('normalModal');
            if(!isFinal) reset();
        }

        // 保存决赛
        function saveFinal() {
            let rows = $('finalLevelList').querySelectorAll('.level-row');
            finalLevels = [];
            rows.forEach(r=>{
                let t = r.querySelector('[data-key=time]').value*1 || 5;
                let sb = r.querySelector('[data-key=sb]').value*1 || 100000;
                let bb = r.querySelector('[data-key=bb]').value*1 || 200000;
                let a = r.querySelector('[data-key=ante]').value*1 || 0;
                finalLevels.push({time:t, sb, bb, ante:a});
            });
            closeModal('finalModal');
        }

        // ============== 界面设置 ==============
        function setLogo() {
            let file = $('logoFile').files[0];
            if(!file) return;
            let url = URL.createObjectURL(file);
            $('logoBox').innerHTML = `<img src="${url}" class="logo-img">`;
        }

        function setBg() {
            let file = $('bgFile').files[0];
            if(!file) return;
            let url = URL.createObjectURL(file);
            document.body.style.backgroundImage = `url(${url})`;
        }

        function saveColors() {
            document.documentElement.style.setProperty('--timer-color', $('timerColor').value);
            document.documentElement.style.setProperty('--info-color', $('infoColor').value);
            closeModal('imgModal');
        }

        // ============== 事件 ==============
        $('normalSet').onclick = () => { renderLevels('normal'); openModal('normalModal'); }
        $('finalSet').onclick = () => { renderLevels('final'); openModal('finalModal'); }
        $('imgSet').onclick = () => openModal('imgModal');
        $('start').onclick = start;
        $('pause').onclick = pause;
        $('reset').onclick = reset;
        $('finalMode').onclick = goFinal;

        // 空格控制
        document.addEventListener('keydown', e=>{
            if(e.code==='Space') {
                e.preventDefault();
                running ? pause() : start();
            }
        });

        // 初始化
        refresh();
    </script>
</body>
</html>
