<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>火石竞技 - 专业赛事计时器 BOBO设计</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="火石竞技">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#4F46E5">
    <link rel="apple-touch-icon" href="LOGO-透明绿色.png">
    <style>
        :root {
            --primary: #4F46E5; --success: #10B988; --warning: #F59E0B; --accent: #06BBD4;
            --bg-set: #818CF8; --normal-set: #EC4899; --final-set: #9333EA; --gray: #64748B;
            --dark: #0F252A; --light: #ffffff; --glass: rgba(255,255,255,0.1);
            --glass-border: rgba(255,255,255,0.2); --timer-color: #ffffff; --info-color: #ffffff;
            --timer-font-size: 120px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: url('./默认网页背景.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            min-height:100vh; overflow:hidden; user-select:none;
        }
        .container { width:100vw; height:100vh; padding:20px; display:flex; flex-direction:column; justify-content:space-between; }
        .top-bar { display:flex; justify-content:space-between; align-items:center; }
        .logo-area { display:flex; align-items:center; gap:12px; }
        .logo-box { width:70px; height:70px; background:var(--glass); border:1px solid var(--glass-border); border-radius:16px; display:flex; align-items:center; justify-content:center; overflow:hidden; }
        .logo-img { width:100%; height:100%; object-fit:contain; }
        .logo-text { color:#fff; font-size:24px; font-weight:800; }
        .btn-group { display:flex; gap:8px; flex-wrap:wrap; }
        .btn { padding:10px 14px; border-radius:12px; border:none; color:white; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:6px; transition:0.2s; background:var(--glass); border:1px solid var(--glass-border); }
        .btn:hover { transform:translateY(-2px); }
        .btn:disabled { opacity:0.5; }
        .btn-image { background:var(--bg-set) !important; }
        .btn-setting { background:var(--normal-set) !important; }
        .btn-final-set { background:var(--final-set) !important; }
        .btn-start { background:var(--success); }
        .btn-pause { background:var(--warning); }
        .btn-reset { background:var(--primary); }
        .btn-final { background:var(--accent); }
        .center-wrap { flex:1; display:flex; align-items:center; justify-content:center; gap:60px; }
        .vertical-buttons { display:flex; flex-direction:column; gap:12px; margin-left:-30px; }
        .timer-center { display:flex; flex-direction:column; align-items:center; gap:10px; }
        .countdown { font-size:var(--timer-font-size); font-weight:900; color:var(--timer-color); letter-spacing:2px; }
        .stage-tag { font-size:20px; color:var(--info-color); font-weight:500; }
        .info-grid { display:flex; gap:24px; }
        .info-item { text-align:center; color:var(--info-color); }
        .info-label { font-size:16px; opacity:0.8; }
        .info-value { font-size:36px; font-weight:700; }
        .footer { text-align:center; color:rgba(255,255,255,0.5); font-size:12px; }
        .modal { position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:999; opacity:0; pointer-events:none; transition:0.3s; }
        .modal.active { opacity:1; pointer-events:auto; }
        .modal-box { background:#1E293B; width:90%; max-width:600px; margin:auto; padding:24px; border-radius:20px; color:white; }
        .modal-header { display:flex; justify-content:space-between; margin-bottom:16px; }
        .close { cursor:pointer; font-size:22px; }
        .table-header { display:grid; grid-template-columns:70px 100px 120px 120px 100px; gap:10px; font-weight:bold; margin-bottom:8px; }
        .level-row { display:grid; grid-template-columns:70px 100px 120px 120px 100px; gap:10px; margin-bottom:10px; }
        .level-row input { padding:6px; background:#272e3a; border:1px solid #444; color:white; border-radius:6px; text-align:center; }
        .add-level, .save-btn { margin-top:10px; padding:8px 16px; background:var(--primary); color:white; border:none; border-radius:8px; cursor:pointer; }
        .save-btn { background:var(--success); width:100%; }
        @keyframes pulse { 0%{transform:scale(1);}50%{transform:scale(1.03);}100%{transform:scale(1);} }
        .pulse { animation:pulse 1s infinite; color:var(--warning); }
        #passwordOverlay { position:fixed; inset:0; background:#0F252A; z-index:9999; display:flex; align-items:center; justify-content:center; color:white; }
        .pwd-box { text-align:center; }
        .pwd-box input { padding:12px 16px; margin:10px 0; border-radius:10px; border:2px solid var(--primary); background:#1E293B; color:white; font-size:16px; }
        .pwd-box button { padding:10px 20px; background:var(--success); color:white; border:none; border-radius:10px; cursor:pointer; }
    </style>
</head>
<body>
<div id="passwordOverlay">
    <div class="pwd-box">
        <h2>火石竞技</h2>
        <p>请输入访问密码</p>
        <input type="password" id="pwdInput" placeholder="输入密码">
        <br><br>
        <button onclick="checkPassword()">确认进入</button>
    </div>
</div>
<div class="container" id="mainContainer" style="display:none;">
    <div class="top-bar">
        <div class="logo-area">
            <div class="logo-box">
                <img src="LOGO-透明绿色.png" class="logo-img" id="logoImg">
            </div>
            <div class="logo-text">火石竞技</div>
        </div>
        <div class="btn-group">
            <button class="btn btn-setting" id="normalSet"><i class="fas fa-cog"></i> 常规设置</button>
            <button class="btn btn-final-set" id="finalSet"><i class="fas fa-crown"></i> 决赛设置</button>
            <button class="btn btn-image" id="imgSet"><i class="fas fa-palette"></i> 界面设置</button>
        </div>
    </div>
    <div class="center-wrap">
        <div class="vertical-buttons">
            <button class="btn btn-start" id="start">开始</button>
            <button class="btn btn-pause" id="pause" disabled>暂停</button>
            <button class="btn btn-reset" id="reset">新局</button>
            <button class="btn btn-final" id="finalMode">决赛</button>
        </div>
        <div class="timer-center">
            <div class="countdown" id="time">10:00</div>
            <div class="stage-tag" id="stage">常规赛 - 第 1 级</div>
            <div class="info-grid">
                <div class="info-item"><div class="info-label">等级</div><div class="info-value" id="level">1</div></div>
                <div class="info-item"><div class="info-label">小盲</div><div class="info-value" id="sb">100</div></div>
                <div class="info-item"><div class="info-label">大盲</div><div class="info-value" id="bb">200</div></div>
                <div class="info-item"><div class="info-label">ANTE</div><div class="info-value" id="ante">0</div></div>
            </div>
        </div>
    </div>
    <div class="footer">火石竞技 © 2026 专业赛事计时器 | BOBO开发</div>
</div>
<!-- 常规设置 -->
<div class="modal" id="normalModal">
    <div class="modal-box">
        <div class="modal-header"><div>常规级别设置</div><div class="close" onclick="closeModal('normalModal')">×</div></div>
        <div class="table-header"><div>级别</div><div>时长</div><div>小盲</div><div>大盲</div><div>ANTE</div></div>
        <div id="normalLevelList"></div>
        <button class="add-level" onclick="addLevel('normal')">增加级别</button>
        <button class="save-btn" onclick="saveNormal()">保存设置</button>
    </div>
</div>
<!-- 决赛设置 -->
<div class="modal" id="finalModal">
    <div class="modal-box">
        <div class="modal-header"><div>决赛设置</div><div class="close" onclick="closeModal('finalModal')">×</div></div>
        <div class="table-header"><div>级别</div><div>时长</div><div>小盲</div><div>大盲</div><div>ANTE</div></div>
        <div id="finalLevelList"></div>
        <button class="add-level" onclick="addLevel('final')">增加级别</button>
        <button class="save-btn" onclick="saveFinal()">保存设置</button>
    </div>
</div>
<!-- 界面设置 -->
<div class="modal" id="imgModal">
    <div class="modal-box">
        <div class="modal-header"><div>界面设置</div><div class="close" onclick="closeModal('imgModal')">×</div></div>
        <div style="margin-bottom:16px;">
            <label>俱乐部LOGO：</label><br>
            <input type="file" id="logoFile" accept="image/*"><br>
            <button onclick="setLogo()" style="margin-top:6px;padding:6px 12px;background:var(--primary);color:white;border:none;border-radius:8px;">应用LOGO</button>
        </div>
        <div style="margin-bottom:16px;">
            <label>背景图片：</label><br>
            <input type="file" id="bgFile" accept="image/*"><br>
            <button onclick="setBg()" style="margin-top:6px;padding:6px 12px;background:var(--primary);color:white;border:none;border-radius:8px;">应用背景</button>
        </div>
        <div style="margin-bottom:16px;">
            <label>倒计时文字颜色：</label><br>
            <input type="color" id="timerColor" value="#ffffff"><br><br>
            <label>等级盲注文字颜色（含常规赛-第1级）：</label><br>
            <input type="color" id="infoColor" value="#ffffff"><br><br>
            <label>倒计时字体大小（px）：</label><br>
            <input type="number" id="timerSize" value="120" style="width:100px;"><br>
        </div>
        <button class="save-btn" onclick="saveColors()">保存配色与字体</button>
    </div>
</div>
<script>
// 登录密码
function checkPassword() {
    const val = document.getElementById('pwdInput').value.trim();
    const now = new Date();
    if (val === 'fr2026') { login(); return; }
    const list = [
        { pwd: 'a1b2', s: '2026-04-01', e: '2026-06-30' },
        { pwd: 'ajax', s: '2026-07-01', e: '2026-09-30' },
        { pwd: 'manc', s: '2026-10-01', e: '2026-12-31' }
    ];
    for (let o of list) {
        const s = new Date(o.s);
        const e = new Date(o.e);
        if (val === o.pwd && now >= s && now <= e) {
            login();
            return;
        }
    }
    alert('密码错误或已过期');
}
function login() {
    document.getElementById('passwordOverlay').style.display = 'none';
    document.getElementById('mainContainer').style.display = 'flex';
    init();
}
// 本地存储
const storage = {
    save: (k, d) => localStorage.setItem(k, JSON.stringify(d)),
    load: (k, def) => { const d = localStorage.getItem(k); return d ? JSON.parse(d) : def; }
};
let normal = storage.load('normal', [
    {time:10,sb:100,bb:200,ante:0},{time:10,sb:200,bb:400,ante:0},
    {time:10,sb:400,bb:800,ante:25},{time:10,sb:800,bb:1600,ante:50},
    {time:10,sb:1600,bb:3200,ante:100},{time:10,sb:3200,bb:6400,ante:200},
    {time:10,sb:6400,bb:12800,ante:400},{time:10,sb:12800,bb:25600,ante:800},
    {time:10,sb:25600,bb:51200,ante:1600},{time:10,sb:51200,bb:102400,ante:3200}
]);
let finalList = storage.load('final', [
    {time:5,sb:100000,bb:200000,ante:10000},{time:5,sb:200000,bb:400000,ante:20000},
    {time:5,sb:400000,bb:800000,ante:40000},{time:5,sb:800000,bb:1600000,ante:80000},
    {time:5,sb:1600000,bb:3200000,ante:160000}
]);
let timer, running = false, isFinal = false, curr = 1, left = 600;
const $ = id => document.getElementById(id);
const dom = { time:$('time'), curr:$('level'), stage:$('stage'), sb:$('sb'), bb:$('bb'), ante:$('ante') };
function fmt(t) {
    const m = String(Math.floor(t/60)).padStart(2,'0');
    const s = String(t%60).padStart(2,'0');
    return m+':'+s;
}
function refresh() {
    const d = isFinal ? finalList[curr-1] : normal[curr-1];
    dom.time.innerText = fmt(left);
    dom.curr.innerText = curr;
    dom.sb.innerText = d.sb.toLocaleString();
    dom.bb.innerText = d.bb.toLocaleString();
    dom.ante.innerText = d.ante.toLocaleString();
    dom.stage.innerText = (isFinal?'决赛圈':'常规赛')+' - 第 '+curr+' 级';
    dom.time.classList.toggle('pulse', left <= 10 && running);
}
function start() {
    if(running) return;
    running = true;
    $('start').disabled = true;
    $('pause').disabled = false;
    timer = setInterval(()=>{
        left--; refresh();
        if(left <= 0){
            const list = isFinal ? finalList : normal;
            curr = Math.min(curr+1, list.length);
            left = list[curr-1].time * 60;
        }
    },1000);
}
function pause() {
    running = false; clearInterval(timer);
    $('start').disabled = false; $('pause').disabled = true;
}
function reset() { pause(); isFinal=false; curr=1; left=normal[0].time*60; refresh(); }
function goFinal() { pause(); isFinal=true; curr=1; left=finalList[0].time*60; refresh(); }
function openModal(id) { $(id).classList.add('active'); }
function closeModal(id) { $(id).classList.remove('active'); }
function renderLevels(type) {
    const list = type==='normal'?normal:finalList;
    let html='';
    list.forEach((it,i)=>{
        html+=`<div class="level-row">
            <div>第${i+1}级</div>
            <input type="number" value="${it.time}" data-key="time">
            <input type="number" value="${it.sb}" data-key="sb">
            <input type="number" value="${it.bb}" data-key="bb">
            <input type="number" value="${it.ante}" data-key="ante">
        </div>`;
    });
    $(type+'LevelList').innerHTML=html;
}
function addLevel(type) {
    const o={time:10,sb:100,bb:200,ante:0};
    type==='normal'?normal.push(o):finalList.push(o);
    renderLevels(type);
}
function saveNormal() {
    normal = [...$('normalLevelList').querySelectorAll('.level-row')].map(r=>
        ({time:~~r.querySelector('[data-key=time]').value||10,
          sb:~~r.querySelector('[data-key=sb]').value||100,
          bb:~~r.querySelector('[data-key=bb]').value||200,
          ante:~~r.querySelector('[data-key=ante]').value||0})
    );
    storage.save('normal',normal); closeModal('normalModal'); reset();
}
function saveFinal() {
    finalList = [...$('finalLevelList').querySelectorAll('.level-row')].map(r=>
        ({time:~~r.querySelector('[data-key=time]').value||5,
          sb:~~r.querySelector('[data-key=sb]').value||100000,
          bb:~~r.querySelector('[data-key=bb]').value||200000,
          ante:~~r.querySelector('[data-key=ante]').value||0})
    );
    storage.save('final',finalList); closeModal('finalModal');
}
// LOGO设置
function setLogo() {
    const file = $('logoFile').files[0];
    if(!file) return;
    const url = URL.createObjectURL(file);
    document.getElementById('logoImg').src = url;
}
// ✅ 修复背景（无语法错误、强制覆盖、不影响其他JS）
function setBg() {
    const file = $('bgFile').files[0];
    if(!file) return;
    const url = URL.createObjectURL(file);
    document.body.style.background = 'none';
    document.body.style.backgroundImage = `url(${url})`;
    document.body.style.backgroundSize = 'cover';
    document.body.style.backgroundPosition = 'center';
    document.body.style.backgroundRepeat = 'no-repeat';
}
function saveColors() {
    const tc = $('timerColor').value;
    const ic = $('infoColor').value;
    const size = $('timerSize').value || 120;
    document.documentElement.style.setProperty('--timer-color', tc);
    document.documentElement.style.setProperty('--info-color', ic);
    document.documentElement.style.setProperty('--timer-font-size', size + 'px');
    storage.save('colors', {tc,ic,size});
    closeModal('imgModal');
}
function init() {
    const c = storage.load('colors',{tc:'#ffffff',ic:'#ffffff',size:120});
    document.documentElement.style.setProperty('--timer-color', c.tc);
    document.documentElement.style.setProperty('--info-color', c.ic);
    document.documentElement.style.setProperty('--timer-font-size', c.size+'px');
    $('timerColor').value = c.tc;
    $('infoColor').value = c.ic;
    $('timerSize').value = c.size;
    refresh();
}
$('start').onclick = start;
$('pause').onclick = pause;
$('reset').onclick = reset;
$('finalMode').onclick = goFinal;
$('normalSet').onclick = ()=>{renderLevels('normal');openModal('normalModal');};
$('finalSet').onclick = ()=>{renderLevels('final');openModal('finalModal');};
$('imgSet').onclick = ()=>openModal('imgModal');
document.addEventListener('keydown',e=>{
    if(e.code==='Space'){e.preventDefault();running?pause():start();}
});
</script>
</body>
</html>
